name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate syntax with bash -n
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' file; do
            printf '==> %s\n' "$file"
            if ! bash -n "$file"; then
              status=1
            fi
          done < <(find openscripts.sh scripts -type f -name '*.sh' -print0)
          exit "$status"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find openscripts.sh scripts -type f -name '*.sh' -print0)
          shellcheck --severity=warning "${files[@]}"

  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        run: bats tests
